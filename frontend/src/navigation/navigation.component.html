<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav p-2.5"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
  >
    <mat-toolbar>
      <div class="image-container relative cursor-pointer" routerLink="home">
        <img class="size-5" ngSrc="/udezeug-transparent.png" alt="" height="50" width="50">
        <div class="absolute w-full h-full"></div>
      </div>
    </mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="home">
        <mat-icon matListItemIcon>home</mat-icon>
        <div matListItemTitle>Home</div>
      </a>
      <a mat-list-item routerLink="admin">
        <mat-icon matListItemIcon>admin_panel_settings</mat-icon>
        <div matListItemTitle>Admin</div>
      </a>
      <a mat-list-item routerLink="profile">
        <mat-icon matListItemIcon>person</mat-icon>
        <div matListItemTitle>Profil</div>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar>
      @if (isHandset$ | async) {
        <button type="button" aria-label="Toggle sidenav" matIconButton (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
      }
    </mat-toolbar>
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
